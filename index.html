<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/img/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c9aea" />
    <meta name="description" content="PHIR-IT: soluciones tecnológicas integrales para el sector salud. Ecosistema de RIS, PACS, informes y portal de pacientes para clínicas y centros de diagnóstico." />
    <title>PHIR-IT | Soluciones Tecnológicas Integrales para Salud</title>

    <!-- Aplica el tema guardado antes de pintar para evitar el parpadeo al recargar. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('phirit-theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var theme = stored === 'light' || stored === 'dark' ? stored : prefersDark ? 'dark' : 'light'
          document.documentElement.classList.toggle('dark', theme === 'dark')
          document.documentElement.style.colorScheme = theme
        } catch (e) {
          /* sin localStorage usamos el tema claro */
        }
      })()
    </script>
  </head>
  <body class="bg-white text-gray-900 dark:bg-brand-dark dark:text-gray-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
